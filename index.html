<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f9e7e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="포코피아 플라이트" />
    <title>포코피아 플라이트</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="포코피아 플라이트 게임">
        <canvas id="gameCanvas" width="420" height="720"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span>점수</span>
            <strong id="scoreText">0</strong>
          </div>
          <div>
            <span>스테이지</span>
            <strong id="stageText">1</strong>
          </div>
          <div>
            <span>체력</span>
            <strong id="hpText">3</strong>
          </div>
        </div>

        <button id="skillButton" class="skill-button" type="button" aria-label="특수 공격">
          특수
        </button>

        <div id="joystick" class="joystick" aria-label="이동 조이스틱">
          <div id="joystickKnob" class="joystick-knob"></div>
        </div>

        <div id="startScreen" class="overlay">
          <div class="start-copy">
            <p class="eyebrow">포켓몬 도감 이미지 활용</p>
            <h1>포코피아 플라이트</h1>
          </div>
          <div id="characterGrid" class="character-grid"></div>
          <button id="startButton" class="primary-button" type="button">시작하기</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
          <div class="result-box">
            <p class="eyebrow">게임 종료</p>
            <h2 id="finalScore">0점</h2>
            <p id="finalStage">스테이지 1</p>
            <button id="restartButton" class="primary-button" type="button">다시하기</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
